name: Daily Activity

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: dhruvkej9/daily-activity
          token: ${{ secrets.PAT }}

      - name: Create random daily commits across target repos
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          set -e
          REPOS=(
            "dhruvkej9/portfolio"
            "dhruvkej9/StyleStreet"
            "dhruvkej9/Aim-Tracker"
            "dhruvkej9/terminator"
            "dhruvkej9/voice-sandwich-demo"
          )
          TARGET=${REPOS[$RANDOM % ${#REPOS[@]}]}
          REPO_NAME=$(echo "$TARGET" | cut -d'/' -f2)

          git clone --depth 1 "https://x-access-token:${PAT}@github.com/${TARGET}.git" "target"
          cd target

          mkdir -p activity-log
          git config user.email "96516827+dhruvkej9@users.noreply.github.com"
          git config user.name "dhruvkej9"

          DATE=$(date -u '+%Y-%m-%d')
          TIME=$(date -u '+%H:%M:%S UTC')
          DAY=$(date -u '+%A')

          MESSAGES=(
            "docs: add ${DATE} learnings"
            "docs: log daily progress for ${DATE}"
            "chore: sync activity log"
            "feat: add ${DATE} activity entry"
            "refactor: update activity index"
            "update: ${DATE} daily reflection"
            "docs: capture ${DATE} insights"
            "style: format activity log"
            "docs: ${DATE} summary"
            "chore: archive ${DATE} progress"
          )

          THOUGHTS=(
            "Small steps every day."
            "Consistency beats intensity."
            "Ship something today."
            "One commit at a time."
            "Keep learning, keep building."
            "Progress is progress."
            "Done is better than perfect."
          )

          COMMIT_COUNTS=(2 3 4)
          COUNT=${COMMIT_COUNTS[$RANDOM % ${#COMMIT_COUNTS[@]}]}

          for i in $(seq 1 $COUNT); do
            NOTE_FILE="activity-log/${DATE}-${i}.md"
            THOUGHT=${THOUGHTS[$RANDOM % ${#THOUGHTS[@]}]}
            MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
            cat > "$NOTE_FILE" <<EOF
          # Activity ${i} for ${DAY}, ${DATE}

          - **Created at:** ${TIME}
          - **Project:** ${REPO_NAME}
          - **Thought:** ${THOUGHT}
          EOF
            git add "$NOTE_FILE"
            git commit -m "$MSG"
          done

          git push "https://x-access-token:${PAT}@github.com/${TARGET}.git" main
