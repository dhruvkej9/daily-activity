name: Daily Activity

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README and create random daily notes
        run: |
          set -e
          mkdir -p notes
          DATE=$(date -u '+%Y-%m-%d')
          TIME=$(date -u '+%H:%M:%S UTC')
          DAY=$(date -u '+%A')

          THOUGHTS=(
            "Small steps every day."
            "Consistency beats intensity."
            "Ship something today."
            "One commit at a time."
            "Keep learning, keep building."
            "Progress is progress."
            "Done is better than perfect."
          )

          COMMIT_COUNTS=(2 3 4)
          COUNT=${COMMIT_COUNTS[$RANDOM % ${#COMMIT_COUNTS[@]}]}

          for i in $(seq 1 $COUNT); do
            NOTE_FILE="notes/${DATE}-${i}.md"
            THOUGHT=${THOUGHTS[$RANDOM % ${#THOUGHTS[@]}]}
            cat > "$NOTE_FILE" <<EOF
          # Note ${i} for ${DAY}, ${DATE}

          - **Created at:** ${TIME}
          - **Thought:** ${THOUGHT}
          EOF
            git add "$NOTE_FILE"
            git -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                -c user.name="github-actions[bot]" \
                commit -m "chore: daily note ${i}/${COUNT} for ${DATE}"
          done

          TOTAL=$(ls notes/*.md 2>/dev/null | wc -l)
          cat > README.md <<EOF
          # Daily Activity Log

          This repository is automatically updated every day.

          - **Last updated:** ${DATE} ${TIME}
          - **Day:** ${DAY}
          - **Notes created today:** ${COUNT}
          - **Total notes so far:** ${TOTAL}

          ${THOUGHT}
          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: daily README update for $(date -u +%Y-%m-%d)"
          file_pattern: README.md
