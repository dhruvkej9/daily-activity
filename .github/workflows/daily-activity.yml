name: Daily Activity

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: dhruvkej9/daily-activity
          token: ${{ secrets.PAT }}

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: dhruvkej9/contributions
          path: target
          token: ${{ secrets.PAT }}

      - name: Create random daily commits in target repo
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          set -e
          cd target
          mkdir -p notes
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          DATE=$(date -u '+%Y-%m-%d')
          TIME=$(date -u '+%H:%M:%S UTC')
          DAY=$(date -u '+%A')

          MESSAGES=(
            "docs: add ${DATE} learnings"
            "docs: log daily progress for ${DATE}"
            "chore: sync daily notes"
            "feat: add ${DATE} activity entry"
            "refactor: update note index"
            "update: ${DATE} daily reflection"
            "docs: capture ${DATE} insights"
            "style: format daily notes"
            "docs: ${DATE} summary"
            "chore: archive ${DATE} progress"
          )

          THOUGHTS=(
            "Small steps every day."
            "Consistency beats intensity."
            "Ship something today."
            "One commit at a time."
            "Keep learning, keep building."
            "Progress is progress."
            "Done is better than perfect."
          )

          COMMIT_COUNTS=(2 3 4)
          COUNT=${COMMIT_COUNTS[$RANDOM % ${#COMMIT_COUNTS[@]}]}

          for i in $(seq 1 $COUNT); do
            NOTE_FILE="notes/${DATE}-${i}.md"
            THOUGHT=${THOUGHTS[$RANDOM % ${#THOUGHTS[@]}]}
            MSG=${MESSAGES[$RANDOM % ${#COMMIT_COUNTS[@]}]}
            cat > "$NOTE_FILE" <<EOF
          # Note ${i} for ${DAY}, ${DATE}

          - **Created at:** ${TIME}
          - **Thought:** ${THOUGHT}
          EOF
            git add "$NOTE_FILE"
            git commit -m "$MSG"
          done

          git push "https://x-access-token:${PAT}@github.com/dhruvkej9/contributions.git" main
