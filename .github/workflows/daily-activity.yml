name: Daily Activity

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README and daily note
        run: |
          set -e
          mkdir -p notes
          DATE=$(date -u '+%Y-%m-%d')
          TIME=$(date -u '+%H:%M:%S UTC')
          DAY=$(date -u '+%A')
          NOTE_FILE="notes/${DATE}.md"

          THOUGHTS=(
            "Small steps every day."
            "Consistency beats intensity."
            "Ship something today."
            "One commit at a time."
            "Keep learning, keep building."
            "Progress is progress."
            "Done is better than perfect."
          )
          THOUGHT=${THOUGHTS[$RANDOM % ${#THOUGHTS[@]}]}

          cat > "$NOTE_FILE" <<EOF
          # Note for ${DAY}, ${DATE}

          - **Created at:** ${TIME}
          - **Thought:** ${THOUGHT}
          EOF

          cat > README.md <<EOF
          # Daily Activity Log

          This repository is automatically updated every day.

          - **Last updated:** ${DATE} ${TIME}
          - **Day:** ${DAY}
          - **Today's note:** [${NOTE_FILE}](${NOTE_FILE})
          - **Total notes so far:** $(ls notes/*.md 2>/dev/null | wc -l)

          ${THOUGHT}
          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily activity for $(date -u +%Y-%m-%d)"
          file_pattern: README.md notes/*.md
