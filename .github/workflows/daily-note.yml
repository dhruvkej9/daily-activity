name: Daily Small Change

on:
  schedule:
    - cron: '35 0 * * *'   # 6:05 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create today's note
        run: |
          mkdir -p notes
          FILE="notes/$(date -u +%Y-%m-%d).md"
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          DAY=$(date -u '+%A')
          THOUGHTS=(
            "Small steps every day."
            "Consistency beats intensity."
            "Ship something today."
            "One commit at a time."
            "Keep learning, keep building."
            "Progress is progress."
            "Done is better than perfect."
          )
          THOUGHT=${THOUGHTS[$RANDOM % ${#THOUGHTS[@]}]}
          cat > "$FILE" <<EOF
          # Note for ${DAY}, $(date -u +%Y-%m-%d)

          - **Created at:** ${DATE}
          - **Thought:** ${THOUGHT}

          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily note for $(date -u +%Y-%m-%d)"
          file_pattern: notes/*.md
